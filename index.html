<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selamat Hari Raya Aidilfitri - UPB EOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --emas: #d4af37;
            --emas-cair: #f9e29d;
            --putih: #ffffff;
            --hijau-tua: #0a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--hijau-tua);
            background-image: url('tema_raya.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* OVERLAY PERTAMA */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: 0.8s ease-in-out;
            padding: 20px; text-align: center;
        }

        .logo-container {
            display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px;
        }

        .logo-container img {
            height: 15vh; max-height: 80px; width: auto;
            filter: drop-shadow(0 0 8px var(--emas));
        }

        .title-raya {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            color: var(--emas-cair); margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        .btn-mula {
            padding: 12px 40px;
            background: linear-gradient(145deg, var(--emas), #b8860b);
            color: var(--putih); border: 2px solid var(--emas-cair);
            border-radius: 50px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* KAD FLIP - OPTIMASI TELEFON */
        .card-container {
            perspective: 2000px; 
            width: 90vw; max-width: 400px; 
            height: 55vh; max-height: 600px; /* Tukar ke height supaya lebih stabil di mobile */
            display: none; z-index: 100;
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 2px solid var(--emas);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('kad_ketupat.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--putih); text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #000;
            display: flex; align-items: center; justify-content: center;
        }

        video { width: 100%; height: 100%; object-fit: cover; } /* Cover supaya penuh skrin kad */

        #ucapan-overlay {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 1s;
            padding: 20px; text-align: center; z-index: 5;
        }

        #ucapan-overlay.show { opacity: 1; visibility: visible; }

        /* ANIMASI BENDERA - MOBILE ADAPTIVE */
        .deployment-area {
            position: absolute;
            bottom: 2%; /* Jarak sikit dari bawah */
            width: 100%; 
            height: 40vh; 
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .svg-master { width: 100%; height: 100%; }

        .trail-path {
            fill: none; stroke: var(--emas); stroke-width: 1;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            opacity: 0.5;
        }

        .trail-path.draw { stroke-dashoffset: 0; transition: 3s; }

        .flag-foreign {
            opacity: 0; transform: scale(0);
            transition: 1s ease-out;
        }

        .flag-foreign.active { opacity: 1; transform: scale(1); }

        .flag-content {
            display: flex; flex-direction: column; align-items: center;
        }

        .flag-content img {
            width: 40px; height: auto; /* Kecilkan sikit untuk mobile screen */
            filter: drop-shadow(0 0 3px black);
        }

        .flag-content span {
            font-size: 8px; color: var(--emas-cair); font-weight: bold;
            text-transform: uppercase; margin-top: 2px;
        }

        @media (max-width: 480px) {
            .card-container { height: 50vh; }
            .flag-content img { width: 35px; }
            .flag-content span { font-size: 7px; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_api.png" alt="PDRM">
            <img src="logo_eod.png" alt="EOD">
        </div>
        <h1 class="title-raya">Selamat Hari Raya</h1>
        <button class="btn-mula" onclick="mulakanWeb()">Buka Kiriman</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="lagu_raya.mp3" type="audio/mpeg">
    </audio>

    <div class="card-container" id="card" onclick="toggleCard()">
        <div class="card-inner">
            <div class="card-front">
                <h1 style="font-family:'Great Vibes'; font-size: 3rem; color: var(--emas-cair);">Salam Aidilfitri</h1>
                <p style="letter-spacing: 2px; font-size: 0.7rem; opacity: 0.9;">MAAF ZAHIR & BATIN</p>
                <p style="font-size: 0.6rem; margin-top: 30px; border: 1px solid var(--emas); padding: 5px 15px; border-radius: 20px;">Sentuh Kad</p>
            </div>
            
            <div class="card-back">
                <video id="rayaVideo" playsinline webkit-playsinline>
                    <source src="hari raya.mp4" type="video/mp4">
                </video>

                <div id="ucapan-overlay">
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <img src="logo_api.png" style="height:40px;">
                        <img src="logo_eod.png" style="height:40px;">
                    </div>
                    <p style="color:var(--emas-cair); font-size:0.8rem; line-height:1.6; margin:0;">
                        Tulus ikhlas daripada kami<br>
                        <strong>UPB / Cawangan Persenjataan</strong><br>
                        IPD KLIA<br>
                        <span style="font-size: 0.7rem; opacity: 0.8;">Menyusun jari memohon ampun & maaf.</span>
                    </p>
                    <div style="font-family:'Great Vibes'; font-size:2rem; color:white; margin-top:15px;">Selamat Hari Raya</div>
                </div>
            </div>
        </div>
    </div>

    <div class="deployment-area" id="deployArea">
        <svg class="svg-master" viewBox="0 0 1000 400">
            <circle cx="500" cy="380" r="5" fill="#fff" /> <path class="trail-path" d="M500,380 L200,100" />
            <path class="trail-path" d="M500,380 L350,50" />
            <path class="trail-path" d="M500,380 L500,30" />
            <path class="trail-path" d="M500,380 L650,50" />
            <path class="trail-path" d="M500,380 L800,100" />

            <foreignObject class="flag-foreign" x="150" y="60" width="100" height="80">
                <div class="flag-content"><img src="Kedah-08.svg"><span>KEDAH</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="300" y="10" width="100" height="80">
                <div class="flag-content"><img src="Selangor-08.svg"><span>SELANGOR</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="450" y="-10" width="100" height="80">
                <div class="flag-content"><img src="Kelantan-08.svg"><span>KELANTAN</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="600" y="10" width="100" height="80">
                <div class="flag-content"><img src="Terengganu-08.svg"><span>TERENGGANU</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="750" y="60" width="100" height="80">
                <div class="flag-content"><img src="Sabah-08.svg"><span>SABAH</span></div>
            </foreignObject>
        </svg>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('rayaVideo');
        const ucapan = document.getElementById('ucapan-overlay');
        const deployArea = document.getElementById('deployArea');

        function mulakanWeb() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('card').style.display = 'block';
                music.play().catch(() => console.log("Autoplay blocked"));
                music.volume = 0.4;
            }, 800);
        }

        function toggleCard() {
            const card = document.getElementById('card');
            card.classList.toggle('is-flipped');
            if (card.classList.contains('is-flipped')) {
                music.volume = 0.1;
                setTimeout(() => { video.play(); }, 300);
            } else {
                video.pause(); video.currentTime = 0;
                music.volume = 0.4;
                ucapan.classList.remove('show');
            }
        }

        video.onended = () => {
            ucapan.classList.add('show');
            music.volume = 0.5;
            deployArea.style.opacity = "1";
            setTimeout(() => {
                document.querySelectorAll('.trail-path').forEach(p => p.classList.add('draw'));
                document.querySelectorAll('.flag-foreign').forEach(f => f.classList.add('active'));
            }, 500);
        };
    </script>
</body>
</html>
