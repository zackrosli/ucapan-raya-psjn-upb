<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Selamat Hari Raya Aidilfitri - UPB EOD</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zackrosli.github.io/ucapan-raya-psjn-upb/">
    <meta property="og:title" content="Selamat Hari Raya Aidilfitri - UPB EOD">
    <meta property="og:description" content="Tulus Ikhlas daripada Cawangan Persenjataan / Unit Pemusnahan Bom IPD KLIA.">
    <meta property="og:image" content="https://zackrosli.github.io/ucapan-raya-psjn-upb/thumb.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&family=Ramabhadra&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --emas: #d4af37;
            --emas-cair: #f9e29d;
            --putih: #ffffff;
            --hijau-tua: #0a1a1a;
        }

        /* FIX 1: LOCK SCREEN & DISABLE SCROLL */
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            max-width: 100vw; max-height: 100vh;
            background-color: var(--hijau-tua);
            background-image: url('tema_raya.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; /* Mengunci skrin dari bergerak */
            position: fixed; /* Mengelakkan 'bounce effect' di iPhone */
        }

        /* OVERLAY UTAMA */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            text-align: center; z-index: 1000; transition: 0.8s ease-in-out;
            padding: 20px; box-sizing: border-box;
        }

        .header-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; margin-bottom: 25px;
        }

        .logo-container { 
            display: flex; justify-content: center; align-items: center;
            gap: 20px; margin-bottom: 10px; 
        }
        
        .logo-container img { 
            height: clamp(70px, 18vw, 90px); 
            filter: drop-shadow(0 0 10px var(--emas)); 
        }

        .subtitle-ipd {
            font-family: 'Ramabhadra', sans-serif;
            color: var(--emas-cair);
            font-size: clamp(1.2rem, 5.5vw, 1.5rem);
            font-weight: 400; margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px var(--emas);
            letter-spacing: 2px; text-transform: uppercase;
        }

        .title-raya {
            font-family: 'Great Vibes', cursive; 
            font-size: clamp(3.2rem, 14vw, 5.8rem); 
            color: var(--emas-cair); 
            text-shadow: 0 0 20px var(--emas), 2px 2px 5px rgba(0,0,0,0.5);
            margin: 10px 0 40px 0;
        }

        .btn-mula {
            padding: 16px 50px; 
            background: linear-gradient(145deg, var(--emas), #b8860b);
            color: white; border: 2px solid var(--emas-cair); 
            border-radius: 50px; font-weight: 600; cursor: pointer; 
            letter-spacing: 2px; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        /* KAD */
        .card-container {
            perspective: 2000px; width: 90vw; max-width: 450px; 
            height: calc(90vw * (9/16)); max-height: 255px;
            display: none; z-index: 100; transform: translateY(-25%);
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            border: 3px solid var(--emas); overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .card-front {
            background-image: url('kad_ketupat.jpg'); background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .card-front h1 { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: var(--emas-cair); margin: 0; }

        .card-back { transform: rotateY(180deg); background: black; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #ucapan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; visibility: hidden;
            transition: 1s ease-in-out; text-align: center; padding: 15px; box-sizing: border-box; z-index: 5;
        }

        #ucapan-overlay.show { opacity: 1; visibility: visible; }

        .logo-ucapan { display: flex; gap: 15px; margin-bottom: 10px; }
        .logo-ucapan img { height: 50px; width: auto; filter: drop-shadow(0 0 5px var(--emas)); }

        .teks-ucapan { color: var(--emas-cair); font-size: 0.75rem; line-height: 1.4; margin: 0; }

        /* FIX 2: RESTRAIN DEPLOYMENT AREA */
        .deployment-area {
            position: absolute; bottom: 13%; 
            width: 100%; max-width: 100vw; /* Pastikan tak lebih lebar skrin */
            display: flex; flex-direction: column; align-items: center; 
            gap: 15px; opacity: 0; transition: opacity 1s; 
            pointer-events: none; z-index: 10;
            overflow: hidden; /* Tambahan kunci */
        }

        .flag-row {
            display: flex; justify-content: center; width: 100%; gap: 8px; /* Kecilkan sikit gap */
        }

        .row-2 { padding: 0 30px; }

        .flag-item {
            display: flex; flex-direction: column; align-items: center;
            width: clamp(50px, 15vw, 62px); /* Responsif mengikut skrin */
            opacity: 0; transform: scale(0);
        }

        .flag-item.active {
            animation: kembangBendera 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            -webkit-animation: kembangBendera 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .flag-item img {
            width: 38px; height: auto; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        .flag-item span {
            font-size: 7px; color: var(--emas); font-weight: bold;
            margin-top: 4px; text-shadow: 1px 1px 2px black; text-transform: uppercase;
            text-align: center; white-space: nowrap;
        }

        @keyframes kembangBendera { to { opacity: 1; transform: scale(1); } }
        @-webkit-keyframes kembangBendera { to { opacity: 1; -webkit-transform: scale(1); } }

    </style>
</head>
<body>

    <div id="overlay">
        <div class="header-container">
            <div class="logo-container">
                <img src="logo_api.png" alt="Logo"><img src="logo_eod.png" alt="Logo">
            </div>
            <div class="subtitle-ipd">IPD KLIA</div>
        </div>
        <h1 class="title-raya">Selamat Hari Raya</h1>
        <button class="btn-mula" onclick="mulakanWeb()">Buka Kiriman</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="lagu_raya.mp3" type="audio/mpeg">
    </audio>

    <div class="card-container" id="card" onclick="toggleCard()">
        <div class="card-inner">
            <div class="card-front">
                <h1>Salam Aidilfitri</h1>
                <p style="color:white; font-size:0.7rem; letter-spacing:2px; margin-top:10px;">( SENTUH KAD )</p>
            </div>
            <div class="card-back">
                <video id="rayaVideo" playsinline>
                    <source src="hari raya.mp4" type="video/mp4">
                </video>
                <div id="ucapan-overlay">
                    <div class="logo-ucapan">
                        <img src="logo_api.png" alt="Logo"><img src="logo_eod.png" alt="Logo">
                    </div>
                    <p class="teks-ucapan">
                        Tulus ikhlas daripada kami<br>
                        <strong>Cawangan Persenjataan / Unit Pemusnahan Bom</strong><br>
                        Ibu Pejabat Polis Daerah KLIA
                    </p>
                    <div style="font-family:'Great Vibes'; font-size:2.2rem; color:var(--putih); margin-top:10px; text-shadow: 0 0 10px rgba(255,255,255,0.5);">Selamat Hari Raya</div>
                </div>
            </div>
        </div>
    </div>

    <div class="deployment-area" id="deployArea">
        <div class="flag-row row-1">
            <div class="flag-item"><img src="Selangor-08.svg"><span>Selangor</span></div>
            <div class="flag-item"><img src="Kedah-08.svg"><span>Kedah</span></div>
            <div class="flag-item"><img src="Perak-08.svg"><span>Perak</span></div>
            <div class="flag-item"><img src="Kelantan-08.svg"><span>Kelantan</span></div>
            <div class="flag-item"><img src="Terengganu-08.svg"><span>Terengganu</span></div>
        </div>
        <div class="flag-row row-2">
            <div class="flag-item"><img src="Pahang-08.svg"><span>Pahang</span></div>
            <div class="flag-item"><img src="Negeri-Sembilan-08.svg"><span>N. Sembilan</span></div>
            <div class="flag-item"><img src="Melacca-08.svg"><span>Melaka</span></div>
            <div class="flag-item"><img src="Johor-08.svg"><span>Johor</span></div>
            <div class="flag-item"><img src="Sarawak-08.svg"><span>Sarawak</span></div>
        </div>
        <div class="flag-row row-3">
            <div class="flag-item"><img src="Sabah-08.svg"><span>Sabah</span></div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('rayaVideo');
        const ucapan = document.getElementById('ucapan-overlay');
        const deployArea = document.getElementById('deployArea');

        function mulakanWeb() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.querySelector('.card-container').style.display = 'block';
                music.play();
                music.volume = 0.5;
            }, 800);
        }

        function toggleCard() {
            const card = document.getElementById('card');
            card.classList.toggle('is-flipped');
            if (card.classList.contains('is-flipped')) {
                music.volume = 0.1;
                ucapan.classList.remove('show');
                setTimeout(() => { video.play(); }, 400);
            } else {
                video.pause(); video.currentTime = 0;
                ucapan.classList.remove('show');
                music.volume = 0.5;
                deployArea.style.opacity = "0";
                document.querySelectorAll('.flag-item').forEach(f => f.classList.remove('active'));
            }
        }

        video.onended = () => { 
            ucapan.classList.add('show'); 
            music.volume = 0.5;
            deployArea.style.opacity = "1";
            
            const items = document.querySelectorAll('.flag-item');
            items.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('active');
                }, index * 100);
            });
        };
    </script>
</body>
</html>
