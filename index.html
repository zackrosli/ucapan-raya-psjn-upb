<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Hari Raya Aidilfitri - UPB EOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --emas: #d4af37;
            --emas-cair: #f9e29d;
            --putih: #ffffff;
            --hijau-tua: #0a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--hijau-tua);
            background-image: url('tema_raya.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* OVERLAY MULA */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: 0.8s ease-in-out;
        }

        .logo-container { display: flex; gap: 15px; margin-bottom: 15px; }
        .logo-container img { height: 75px; filter: drop-shadow(0 0 8px var(--emas)); }

        .title-raya {
            font-family: 'Great Vibes', cursive; font-size: clamp(3rem, 10vw, 5rem);
            color: var(--emas-cair); text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        .btn-mula {
            padding: 14px 45px; background: linear-gradient(145deg, var(--emas), #b8860b);
            color: white; border: 2px solid var(--emas-cair); border-radius: 50px;
            font-weight: 600; cursor: pointer; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* KAD UTAMA */
        .card-container {
            perspective: 2000px; width: 90vw; max-width: 450px; 
            height: calc(90vw * (9/16)); max-height: 255px;
            display: none; z-index: 100; transform: translateY(-30%);
        }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            border: 3px solid var(--emas); overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .card-front {
            background-image: url('kad_ketupat.jpg'); background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .card-front h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--emas-cair); margin: 0; }

        .card-back { transform: rotateY(180deg); background: black; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* UCAPAN & LOGO DALAM KAD */
        #ucapan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; visibility: hidden;
            transition: 1s ease-in-out; text-align: center; padding: 15px; box-sizing: border-box; z-index: 5;
        }

        #ucapan-overlay.show { opacity: 1; visibility: visible; }

        .logo-ucapan { display: flex; gap: 15px; margin-bottom: 10px; }
        .logo-ucapan img { height: 50px; width: auto; filter: drop-shadow(0 0 5px var(--emas)); }

        .teks-ucapan { color: var(--emas-cair); font-size: 0.75rem; line-height: 1.4; margin: 0; }

        /* AREA ANIMASI DEPLOYMENT */
        .deployment-area {
            position: absolute; bottom: 2%; width: 100%; height: 55vh;
            opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 10;
        }

        .svg-master { width: 100%; height: 100%; overflow: visible; }
        .origin-dot { fill: #fff; filter: drop-shadow(0 0 10px #ff4d4d); }

        .trail-path {
            fill: none; stroke: rgba(212, 175, 55, 0.6); stroke-width: 1.5;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
        }

        .trail-path.draw {
            stroke-dashoffset: 0; transition: stroke-dashoffset 4s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* BENDERA KELUAR DARI TITIK TENGAH */
        .flag-foreign {
            opacity: 0; transform: scale(0);
            transform-origin: 500px 200px; /* Titik tengah koordinat SVG */
            transition: transform 4s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.5s;
        }

        .flag-foreign.active { opacity: 1; transform: scale(1); }

        .flag-content { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .flag-content img { width: 85px; height: auto; filter: drop-shadow(0 0 5px black); }
        .flag-content span { font-size: 9px; color: var(--emas); font-weight: bold; text-shadow: 1px 1px 2px black; }

    </style>
</head>
<body>

    <div id="overlay">
        <div class="logo-container">
            <img src="logo_api.png" alt="Logo"><img src="logo_eod.png" alt="Logo">
        </div>
        <h1 class="title-raya">Selamat Hari Raya</h1>
        <button class="btn-mula" onclick="mulakanWeb()">Buka Kiriman</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="lagu_raya.mp3" type="audio/mpeg">
    </audio>

    <div class="card-container" id="card" onclick="toggleCard()">
        <div class="card-inner">
            <div class="card-front">
                <h1>Salam Aidilfitri</h1>
                <p style="color:white; font-size:0.7rem; letter-spacing:2px;">( SENTUH KAD )</p>
            </div>
            <div class="card-back">
                <video id="rayaVideo" playsinline>
                    <source src="hari raya.mp4" type="video/mp4">
                </video>
                <div id="ucapan-overlay">
                    <div class="logo-ucapan">
                        <img src="logo_api.png" alt="Logo">
                        <img src="logo_eod.png" alt="Logo">
                    </div>
                    <p class="teks-ucapan">
                        Tulus ikhlas daripada kami<br>
                        <strong>Cawangan Persenjataan / Unit Pemusnahan Bom</strong><br>
                        Ibu Pejabat Polis Daerah KLIA
                    </p>
                    <div style="font-family:'Great Vibes'; font-size:2rem; color:white; margin-top:10px;">Selamat Hari Raya</div>
                </div>
            </div>
        </div>
    </div>

    <div class="deployment-area" id="deployArea">
        <svg class="svg-master" viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
            <circle class="origin-dot" cx="500" cy="200" r="5" />

            <path class="trail-path" d="M500,200 L410,130" /> 
            <path class="trail-path" d="M500,200 L320,80" /> 
            <path class="trail-path" d="M500,200 L250,170" /> 
            <path class="trail-path" d="M500,200 L430,60" /> 
            <path class="trail-path" d="M500,200 L570,80" /> 
            <path class="trail-path" d="M500,200 L650,130" /> 
            <path class="trail-path" d="M500,200 L360,280" /> 
            <path class="trail-path" d="M500,200 L480,310" /> 
            <path class="trail-path" d="M500,200 L600,280" /> 
            <path class="trail-path" d="M500,200 Q620,270 650,250" /> 
            <path class="trail-path" d="M500,200 Q650,100 740,140" /> 

            <foreignObject class="flag-foreign" x="360" y="80" width="100" height="85">
                <div class="flag-content"><img src="Selangor-08.svg"><span>SELANGOR</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="270" y="30" width="100" height="85">
                <div class="flag-content"><img src="Kedah-08.svg"><span>KEDAH</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="200" y="120" width="100" height="85">
                <div class="flag-content"><img src="Perak-08.svg"><span>PERAK</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="380" y="10" width="100" height="85">
                <div class="flag-content"><img src="Kelantan-08.svg"><span>KELANTAN</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="520" y="30" width="100" height="85">
                <div class="flag-content"><img src="Terengganu-08.svg"><span>TERENGGANU</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="600" y="80" width="100" height="85">
                <div class="flag-content"><img src="Pahang-08.svg"><span>PAHANG</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="310" y="230" width="100" height="85">
                <div class="flag-content"><img src="Negeri-Sembilan-08.svg"><span>N. SEMBILAN</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="430" y="260" width="100" height="85">
                <div class="flag-content"><img src="Melacca-08.svg"><span>MELAKA</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="550" y="230" width="100" height="85">
                <div class="flag-content"><img src="Johor-08.svg"><span>JOHOR</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="600" y="200" width="100" height="85">
                <div class="flag-content"><img src="Sarawak-08.svg"><span>SARAWAK</span></div>
            </foreignObject>
            <foreignObject class="flag-foreign" x="690" y="90" width="100" height="85">
                <div class="flag-content"><img src="Sabah-08.svg"><span>SABAH</span></div>
            </foreignObject>
        </svg>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('rayaVideo');
        const ucapan = document.getElementById('ucapan-overlay');
        const deployArea = document.getElementById('deployArea');

        function mulakanWeb() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.querySelector('.card-container').style.display = 'block';
                music.play();
                music.volume = 0.5;
            }, 800);
        }

        function toggleCard() {
            const card = document.getElementById('card');
            card.classList.toggle('is-flipped');
            if (card.classList.contains('is-flipped')) {
                music.volume = 0.1;
                ucapan.classList.remove('show');
                setTimeout(() => { video.play(); }, 400);
            } else {
                video.pause(); video.currentTime = 0;
                ucapan.classList.remove('show');
                music.volume = 0.5;
                deployArea.style.opacity = "0";
                // Reset Animasi
                document.querySelectorAll('.trail-path').forEach(p => p.classList.remove('draw'));
                document.querySelectorAll('.flag-foreign').forEach(f => f.classList.remove('active'));
            }
        }

        // TRIGGER SEMUA ANIMASI BILA VIDEO TAMAT
        video.onended = () => { 
            ucapan.classList.add('show'); 
            music.volume = 0.5;
            deployArea.style.opacity = "1";
            
            setTimeout(() => {
                document.querySelectorAll('.trail-path').forEach(p => p.classList.add('draw'));
                document.querySelectorAll('.flag-foreign').forEach(f => f.classList.add('active'));
            }, 300); 
        };
    </script>
</body>
</html>
